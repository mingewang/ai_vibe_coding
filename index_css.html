<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comrite AI Vibe Coding</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 640px;
      margin: 80px auto;
      padding: 0 24px;
      background: #fafafa;
      color: #1a1a1a;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 32px;
      animation: fadeIn 1.2s ease forwards;
    }
    ul { list-style: none; padding: 0; }
    li {
      margin-bottom: 16px;
      animation: slideIn 1.4s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
      opacity: 0;
      transform: translateX(-40px);
    }
    li:nth-child(1) { animation-delay: 0.2s; }
    li:nth-child(2) { animation-delay: 0.5s; }
    li:nth-child(3) { animation-delay: 0.8s; }
    li:nth-child(4) { animation-delay: 1.1s; }
    li:nth-child(5) { animation-delay: 1.4s; }
    li:nth-child(6) { animation-delay: 1.7s; }
    a {
      text-decoration: none;
      color: #2563eb;
      font-size: 1.5rem;
      font-weight: 500;
      display: inline-block;
      transition: transform 0.3s ease, color 0.3s ease;
    }
    a:hover {
      color: #1d4ed8;
      transform: translateX(8px) scale(1.05);
    }

    .ball {
      margin: 48px auto 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      animation: spin 1s linear infinite, bounceX 2.4s ease-in-out infinite;
    }

    @keyframes fadeIn {
      0%   { opacity: 0; transform: translateY(-18px); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes slideIn {
      0%   { opacity: 0; transform: translateX(-40px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes bounceX {
      0%, 100% { transform: translateX(-80px); }
      50%      { transform: translateX(80px); }
    }
  </style>
</head>
<body>
  <h1>Comrite AI Vibe Coding</h1>
  <ul>
    <li><a href="agent/">agent</a></li>
    <li><a href="games/">games</a></li>
    <li><a href="mobile/">mobile</a></li>
    <li><a href="professional/">professional</a></li>
    <li><a href="web/">web</a></li>
    <li><a href="web2/">web2</a></li>
  </ul>
  <div class="ball"></div>
</body>
</html>
