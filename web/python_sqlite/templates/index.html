{% extends "base.html" %}
{% block title %}Blog - Home{% endblock %}
{% block content %}
    <h1>Blog Posts</h1>
    {% if posts %}
        {% for post in posts %}
            <article>
                <h2><a href="{{ url_for('blog.view_post', post_id=post.id) }}">{{ post.title }}</a></h2>
                <p class="meta">by {{ post.username }} on {{ post.created_at }}</p>
            </article>
        {% endfor %}
    {% else %}
        <p>No posts yet.</p>
    {% endif %}
{% endblock %}
