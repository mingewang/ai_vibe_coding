{% extends "base.html" %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}
    <article>
        <h1>{{ post.title }}</h1>
        <p class="meta">by {{ post.username }} on {{ post.created_at }}</p>
        <div class="body">{{ post.body }}</div>
    </article>
    <p><a href="{{ url_for('blog.index') }}">&larr; Back to all posts</a></p>
{% endblock %}
