name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install withsupabase dependencies
        working-directory: web/withsupabase
        run: npm install

      - name: Build withsupabase app
        working-directory: web/withsupabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p public-site/withsupabase
          cp -R web/withsupabase/dist/* public-site/withsupabase/
          cp index.html public-site/index.html
          mkdir -p public-site/agent public-site/games public-site/mobile public-site/professional public-site/web public-site/web2

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-site
          enable_jekyll: false
          force_orphan: true
