<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casual Sim</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="ui">
    <div id="title">Casual Sim</div>
    <div id="controls">
      <button id="btn-cube" class="active">Cube</button>
      <button id="btn-sphere">Sphere</button>
      <button id="btn-clear">Clear</button>
    </div>
    <div id="stats">
      Objects: <span id="count">0</span>
    </div>
    <div id="hint">Click on the ground to spawn objects</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
